# LDTR-inspired Lane Segmentation Training Configuration
# ====================================
# Architecture: Multi-Scale CNN-Transformer Encoder + Deformable Decoder

model:
  img_size: [360, 640]              # Input resolution (H, W)
  in_channels: 3                    # RGB input
  backbone: "resnet50"              # Pretrained backbone
  backbone_channels: [256, 512, 1024] # ResNet-50 stage channels
  freeze_backbone: true             # Freeze ResNet layers to prevent overfitting
  embed_dim: 256                    # Transformer/decoder embedding dimension
  num_heads: 8                      # Attention heads
  num_classes: 3                    # 0=background, 1=dashed, 2=solid
  transformer_depth: 6              # Transformer blocks in encoder (at 1/16 scale)
  num_decoder_layers: 6             # Deformable decoder layers
  num_queries: 100                  # Learnable query embeddings
  num_deform_points: 4              # Sampling points per deformable attention head
  fpn_channels: 128                 # FPN intermediate channels
  expansion_ratio: 4                # FFN hidden dim = embed_dim × expansion_ratio
  dropout: 0.1                      # Dropout rate
  drop_path_rate: 0.1               # Max stochastic depth rate

training:
  batch_size: 4                # Adjust based on GPU memory (4 for ~10GB VRAM)
  grad_accum_steps: 4          # Effective batch size = batch_size * grad_accum_steps (4 * 4 = 16)
  epochs: 100                 # Total training epochs
  lr: 1.0e-4                  # Peak learning rate (after warmup)
  weight_decay: 0.05          # AdamW weight decay
  warmup_epochs: 5            # Linear warmup epochs
  min_lr: 1.0e-6              # Minimum learning rate (cosine annealing floor)
  amp: true                   # Enable mixed-precision training (FP16)
  grad_clip: 1.0              # Max gradient norm (0 = disabled)
  early_stopping_patience: 20 # Stop if val mIoU doesn't improve for this many epochs
  save_every: 5               # Save checkpoint every N epochs

data:
  train_image_dir: "dataset/images/train"
  val_image_dir: "dataset/images/val"
  train_mask_dir: "dataset/masks/train"
  val_mask_dir: "dataset/masks/val"
  num_workers: 4              # DataLoader workers
  pin_memory: true            # Pin memory for faster GPU transfer

loss:
  focal_weight: 1.0           # Weight for Focal loss component
  dice_weight: 1.0            # Weight for Dice loss component
  heatmap_weight: 0.5         # Weight for Gaussian heatmap auxiliary loss
  focal_gamma: 3.0            # Focal loss focusing parameter
  use_class_weights: false    # Disabled: auto-weights caused over-prediction

logging:
  log_dir: "runs"             # TensorBoard log directory
  ckpt_dir: "checkpoints"     # Directory to save model checkpoints
  log_every: 10               # Log metrics every N batches
  val_every: 1                # Validate every N epochs
